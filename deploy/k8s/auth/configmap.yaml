apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: auth-staging
data:
  NODE_ENV: 'staging'
  LOG_LEVEL: 'info'
  TZ: 'UTC'
  API_HOST: '0.0.0.0'
  API_PORT: '3000'
  RATE_LIMIT_GLOBAL_PER_MIN: '100'
  RATE_LIMIT_WEBHOOK_PER_MIN: '300'
  RATE_LIMIT_LOGIN_PER_MIN: '10'
  WORKER_CONCURRENCY_DEFAULT: '5'
  # JWT TTLs — MVP-AUTH-FIRST §3 + PARENT §4-D04 override to 15m access.
  JWT_ACCESS_TTL: '15m'
  JWT_REFRESH_TTL: '30d'
  ENCRYPTION_KEY_VERSION: 'v1'
  # CSRF double-submit ships OFF this wave (Q-INT-AUTH-02). Flip after FE
  # cold-boot csrf-seeding verified on staging, else every mutation 403s.
  CSRF_ENFORCE: 'false'
  # Sentry — leave blank in staging to disable.
  SENTRY_DSN: ''
  SENTRY_TRACES_SAMPLE_RATE: '0.1'
  SENTRY_ENV: 'staging'
  # Redis DB indexes (queue vs cache).
  REDIS_QUEUE_DB: '0'
  REDIS_CACHE_DB: '1'
  REDIS_TLS_ENABLED: 'false'
