apiVersion: batch/v1
kind: Job
metadata:
  name: auth-migrate
  namespace: auth-staging
spec:
  # Preserve completed pod logs for 24 h.
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: auth-migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: migrate
          image: ghcr.io/satriowicaksn/auth-backend-api:latest
          imagePullPolicy: Always
          # `prisma` now shipped as a runtime dependency (Dockerfile pitfall 6.2).
          # `prisma migrate deploy` is production-safe (no --dev prompts).
          command: ['node', 'node_modules/prisma/build/index.js']
          args: ['migrate', 'deploy']
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 384Mi
